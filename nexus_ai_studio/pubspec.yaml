name: nexus_ai_studio
description: AI-powered viral content automation for Android
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5
  get_it: ^7.7.0

  # Networking
  dio: ^5.4.3

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3
  sqflite: ^2.3.2
  path_provider: ^2.1.3

  # UI / Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.4

  # Media
  video_player: ^2.8.6
  cached_network_image: ^3.3.1

  # Notifications
  flutter_local_notifications: ^17.1.2

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  uuid: ^4.4.0
  http: ^1.2.1

  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
